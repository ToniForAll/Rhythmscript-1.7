<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RhythmscripT</title>
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css?family=Monoton" rel="stylesheet" />
    <link rel="icon" href="img/icono.webp" type="image/x-icon" />
    <link rel="stylesheet" href="style/styleformulario.css">
    <link rel="stylesheet" href="style/multiplayer.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
</head>
<body>
    <img src="img/Frame7_70.webp" class="bgImage" />
    
    <div class="siteContainer">
        <header class="header">
            <nav>
                <img onclick="window.location.href='index.html'" src="img/grisazul.webp" />
                <div class="navItems" id="navItems"></div>
            </nav>
        </header>

        <!-- Pantalla de lista de salas -->
        <div id="roomListScreen" class="rooms-container">
            <div class="rooms-header">
                <button id="refreshRoomsBtn">Actualizar</button>
                <button id="createRoomBtn">Crear Sala</button>
            </div>
            <div id="roomsList" class="rooms-list"></div>
        </div>

        <!-- Pantalla de sala de espera -->
        <div id="waitingRoomScreen" class="waiting-room hidden">
            <div class="room-header">
                <div class="room-title">
                    <span class="room-id" id="roomIdDisplay"></span>
                    <span class="room-creator" id="roomCreatorDisplay"></span>
                </div>
                <button id="leaveRoomBtn" class="leave-button">Abandonar</button>
            </div>

            <div class="room-layout">
                <!-- COLUMNA IZQUIERDA: Lista de niveles con buscador -->
                <div class="levels-column">
                    <div class="levels-header">
                        <h3>Seleccionar Nivel</h3>
                        <div class="search-box">
                            <input type="text" id="levelSearchInput" placeholder="Buscar nivel..." class="level-search-input">
                        </div>
                    </div>
                    
                    <div class="levels-grid-select" id="levelsSelectionGrid"></div>
                </div>

                <!-- COLUMNA DERECHA: Información de sala y jugadores -->
                <div class="info-column">
                    <!-- Panel de jugadores -->
                    <div class="players-panel">
                        <h3>Jugadores en sala</h3>
                        <div class="players-list" id="playersList"></div>
                    </div>

                    <!-- Panel de información del nivel seleccionado -->
                    <div class="level-info-panel" id="selectedLevelInfo">
                        <div class="no-level-selected">
                            <p>Selecciona un nivel para ver sus detalles</p>
                        </div>
                    </div>

                    <!-- Botón de listo -->
                    <button id="readyBtn" class="ready-button" disabled>LISTO PARA JUGAR</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script/sesion.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="script/multiplayer.js"></script>
</body>
</html>
